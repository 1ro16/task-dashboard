<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク進捗ダッシュボード</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #0f1923;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 30px;
  }
  h1 {
    font-size: 24px;
    color: #00d4ff;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #8892a0;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .summary {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #1a2332;
    border-radius: 8px;
    padding: 16px 24px;
    min-width: 140px;
  }
  .summary-card .label {
    color: #8892a0;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 28px;
    font-weight: bold;
  }
  .summary-card .value.green { color: #00e676; }
  .summary-card .value.cyan { color: #00d4ff; }
  .summary-card .value.red { color: #ff4d4d; }

  .task-list { display: flex; flex-direction: column; gap: 20px; }

  /* ── グループ（親タスク） ── */
  .group {
    background: #1a2332;
    border-radius: 10px;
    padding: 20px 24px;
    transition: all 0.3s ease;
  }
  .group.completed { opacity: 0.5; }
  .group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .group-name {
    font-size: 18px;
    font-weight: bold;
  }
  .group-remaining {
    font-size: 24px;
    font-weight: bold;
    min-width: 70px;
    text-align: right;
  }
  .group-remaining.high { color: #ff4d4d; }
  .group-remaining.mid { color: #ff9800; }
  .group-remaining.low { color: #00e676; }
  .group-remaining.done { color: #00e676; }

  .bar-container {
    background: #0f1923;
    border-radius: 4px;
    height: 32px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .bar-fill.high { background: linear-gradient(90deg, #ff4d4d, #ff6b6b); }
  .bar-fill.mid { background: linear-gradient(90deg, #ff9800, #ffb74d); }
  .bar-fill.low { background: linear-gradient(90deg, #00e676, #69f0ae); }
  .bar-fill.done { background: #00e676; width: 0% !important; }

  /* ── サブタスク ── */
  .subtasks {
    margin-top: 14px;
    padding-left: 16px;
    border-left: 2px solid #2a3a4a;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .sub-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sub-name {
    font-size: 14px;
    color: #c0c8d0;
    min-width: 180px;
    flex-shrink: 0;
  }
  .sub-bar-container {
    background: #0f1923;
    border-radius: 3px;
    height: 18px;
    flex-grow: 1;
    overflow: hidden;
  }
  .sub-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .sub-bar-fill.high { background: #ff4d4d; }
  .sub-bar-fill.mid { background: #ff9800; }
  .sub-bar-fill.low { background: #00e676; }
  .sub-bar-fill.done { width: 0% !important; }
  .sub-remaining {
    font-size: 14px;
    font-weight: bold;
    min-width: 50px;
    text-align: right;
  }
  .sub-remaining.high { color: #ff4d4d; }
  .sub-remaining.mid { color: #ff9800; }
  .sub-remaining.low { color: #00e676; }
  .sub-remaining.done { color: #00e676; }

  /* ── 単独タスク（サブなし） ── */
  .task-item {
    background: #1a2332;
    border-radius: 8px;
    padding: 20px 24px;
    transition: all 0.3s ease;
  }
  .task-item.completed { opacity: 0.5; }
  .task-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .task-name {
    font-size: 16px;
    font-weight: bold;
  }
  .task-remaining {
    font-size: 20px;
    font-weight: bold;
    min-width: 60px;
    text-align: right;
  }
  .task-remaining.high { color: #ff4d4d; }
  .task-remaining.mid { color: #ff9800; }
  .task-remaining.low { color: #00e676; }
  .task-remaining.done { color: #00e676; }

  .tag {
    background: #0f1923;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-left: 8px;
  }
  .tag.urgent { border: 1px solid #ff4d4d; color: #ff4d4d; }
  .tag.normal { border: 1px solid #00d4ff; color: #00d4ff; }

  .task-meta {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 12px;
    color: #8892a0;
  }

  .footer {
    margin-top: 40px;
    color: #8892a0;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>タスク進捗ダッシュボード</h1>
<p class="subtitle">残量が0になれば完了。棒が消えていく達成感を。</p>

<div class="summary">
  <div class="summary-card">
    <div class="label">総タスク数</div>
    <div class="value cyan" id="totalCount">—</div>
  </div>
  <div class="summary-card">
    <div class="label">完了</div>
    <div class="value green" id="doneCount">—</div>
  </div>
  <div class="summary-card">
    <div class="label">残り</div>
    <div class="value red" id="remainCount">—</div>
  </div>
  <div class="summary-card">
    <div class="label">平均残量</div>
    <div class="value cyan" id="avgRemain">—</div>
  </div>
</div>

<div class="task-list" id="taskList"></div>

<div class="footer">
  最終更新：<span id="lastUpdate">—</span><br>
  進捗はClaudianに報告 → 更新されます
</div>

<script>
// ════════════════════════════════════════════
// タスクデータ（Claudianがここを編集する）
// ════════════════════════════════════════════
const LAST_UPDATE = "2026-05-16 夜";

// ════════════════════════════════════════════
// タスクデータ（Claudianがここを編集する）
//
// グループタスク：subtasks 配列にサブタスクを入れる
//   → 親の棒グラフはサブタスクの平均残量で自動計算
// 単独タスク：subtasks を省略 or 空配列、remaining を直接指定
// ════════════════════════════════════════════

const tasks = [
  {
    name: "AI物販：イラストを1枚作る",
    tag: "urgent",
    subtasks: [
      { name: "SD講座の動画を見る", remaining: 100 },
      { name: "civitai使い方を把握する", remaining: 100 },
      { name: "イラスト1枚完成", remaining: 100 },
    ]
  },
  {
    name: "債権回収",
    tag: "urgent",
    subtasks: [
      { name: "中井さんに手紙を書く", remaining: 30 },
      { name: "回収計画を作る", remaining: 100 },
    ]
  },
  {
    name: "Takakiプロジェクト",
    tag: "urgent",
    remaining: 100,
  },
  {
    name: "痛散湯 テレビCM分析",
    tag: "urgent",
    subtasks: [
      { name: "全体的な分析", remaining: 0 },
      { name: "表現の分析", remaining: 0 },
      { name: "企画書に落とす", remaining: 0 },
    ]
  },
  {
    name: "サンフレッチェ広島ブログ",
    tag: "normal",
    subtasks: [
      { name: "toto改善記事", remaining: 0 },
      { name: "toto予想", remaining: 0 },
      { name: "G大阪戦プレビュー記事", remaining: 0 },
      { name: "優勝がなくなってどこを楽しむか", remaining: 0 },
      { name: "監督同士の熱い戦い（監督対決記事）", remaining: 0 },
      { name: "Dixon-Colesモデル(v2)実装＋バックテスト", remaining: 0 },
      { name: "G大阪戦レビュー記事", remaining: 0 },
      { name: "塩谷司 記事", remaining: 0 },
      { name: "京都戦プレビュー記事＋SNS3種", remaining: 0 },
      { name: "山崎太一 成長・期待コラム", remaining: 100 },
    ]
  },
  {
    name: "FXブログ 週間振り返り",
    tag: "normal",
    subtasks: [
      { name: "記事WPアップ", remaining: 0 },
      { name: "X投稿", remaining: 0 },
      { name: "Substack配信", remaining: 0 },
    ]
  },
  {
    name: "アーユルヴェーダ",
    tag: "normal",
    subtasks: [
      { name: "Xアカウント開設（ユーザー名・プロフィール・画像）", remaining: 100 },
      { name: "X初期フォロー＋初投稿", remaining: 100 },
      { name: "Substack開設（名前・説明文・アカウント作成）", remaining: 100 },
      { name: "Substack初期配信記事の準備", remaining: 100 },
      { name: "サイトにSubstack登録導線を設置", remaining: 100 },
      { name: "AdSense申請（5/16申請完了・審査待ち）", remaining: 0 },
      { name: "記事量産（現在24本デプロイ済→50本目標）", remaining: 52 },
      { name: "iHerbアフィリエイト調査", remaining: 100 },
      { name: "A8.net案件調査", remaining: 100 },
      { name: "Search Console・GA設定", remaining: 0 },
    ]
  },
  {
    name: "CMC（AI導入伴走を統合）",
    tag: "urgent",
    subtasks: [
      { name: "X発信（#6まで完了）", remaining: 40 },
      { name: "屋号・ドメイン決定（カナタカラ／kanatakara.com）", remaining: 0 },
      { name: "サイト構築：WPインストール＋DNS接続", remaining: 100 },
      { name: "サイト構築：テーマ選定＋LP公開", remaining: 100 },
      { name: "サイト構築：ブログ機能＋記事1〜2本", remaining: 100 },
      { name: "初期コンテンツ10本完成", remaining: 50 },
      { name: "Substack開設", remaining: 0 },
      { name: "Anthropic Academy受講（Claude 101＋Claude Code in action）", remaining: 100 },
      { name: "既存クライアント1社にテスト提案", remaining: 100 },
      { name: "AI設計日記 連載開始", remaining: 100 },
    ]
  },
  {
    name: "FXブログ 事業基盤",
    tag: "normal",
    subtasks: [
      { name: "FXアフィリエイト設定", remaining: 100 },
      { name: "SSL化完了＋サイト仕上げ", remaining: 0 },
      { name: "X・Substackフォロー導線設置", remaining: 0 },
    ]
  },
  {
    name: "Googleインデックス改善：ayurveda-herb.com",
    tag: "urgent",
    subtasks: [
      { name: "robots.ts追加", remaining: 0 },
      { name: "og:image・twitter:image全ページ設定", remaining: 0 },
      { name: "Canonical URL設定", remaining: 0 },
      { name: "article:publishedTime設定", remaining: 0 },
      { name: "JSON-LD structured data実装", remaining: 0 },
      { name: "Search Consoleインデックス確認", remaining: 30 },
    ]
  },
  {
    name: "Googleインデックス改善：fxsurfing16.com",
    tag: "urgent",
    subtasks: [
      { name: "SSL化完了", remaining: 0 },
      { name: "OGP設定", remaining: 0 },
      { name: "ファビコン設定", remaining: 0 },
      { name: "Search Console（不要ページ削除済・リクエスト3件は5/10）", remaining: 30 },
    ]
  },
  {
    name: "Googleインデックス改善：その他サイト",
    tag: "normal",
    subtasks: [
      { name: "sanfrecce-hiroshima.com（1,140ページ未登録）", remaining: 100 },
      { name: "books16.com", remaining: 100 },
      { name: "it16it.com", remaining: 100 },
    ]
  },
  {
    name: "中川プロジェクト",
    tag: "urgent",
    subtasks: [
      { name: "サイトマップを確認する", remaining: 100 },
    ]
  },
  { name: "エマニュエル・ルベツキ作品を見る", remaining: 100, tag: "normal" },
  { name: "ブレインマップ調査→高城剛さんに質問", remaining: 100, tag: "normal" },
];
// ════════════════════════════════════════════

function getColorClass(r) {
  if (r <= 0) return "done";
  if (r <= 30) return "low";
  if (r <= 70) return "mid";
  return "high";
}

function getGroupRemaining(task) {
  if (task.subtasks && task.subtasks.length > 0) {
    const sum = task.subtasks.reduce((s, t) => s + t.remaining, 0);
    return Math.round(sum / task.subtasks.length);
  }
  return task.remaining || 0;
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  // 全タスクの残量を計算してソート
  const withRemaining = tasks.map(t => ({ ...t, _r: getGroupRemaining(t) }));
  withRemaining.sort((a, b) => {
    if (a._r <= 0 && b._r > 0) return 1;
    if (a._r > 0 && b._r <= 0) return -1;
    return b._r - a._r;
  });

  withRemaining.forEach(task => {
    const remaining = task._r;
    const cc = getColorClass(remaining);
    const isDone = remaining <= 0;
    const tagLabel = task.tag === "urgent" ? "緊急" : "通常";
    const hasSubs = task.subtasks && task.subtasks.length > 0;

    if (hasSubs) {
      // ── グループタスク ──
      const div = document.createElement("div");
      div.className = "group" + (isDone ? " completed" : "");

      let subsHtml = "";
      task.subtasks.forEach(sub => {
        const sc = getColorClass(sub.remaining);
        const subDone = sub.remaining <= 0;
        subsHtml += `
          <div class="sub-item">
            <span class="sub-name">${subDone ? "✅ " : ""}${sub.name}</span>
            <div class="sub-bar-container">
              <div class="sub-bar-fill ${sc}" style="width: ${sub.remaining}%"></div>
            </div>
            <span class="sub-remaining ${sc}">${subDone ? "完了" : sub.remaining + "%"}</span>
          </div>
        `;
      });

      div.innerHTML = `
        <div class="group-header">
          <div>
            <span class="group-name">${isDone ? "✅ " : ""}${task.name}</span>
            <span class="tag ${task.tag}">${tagLabel}</span>
          </div>
          <div class="group-remaining ${cc}">
            ${isDone ? "完了" : remaining + "%"}
          </div>
        </div>
        <div class="bar-container">
          <div class="bar-fill ${cc}" style="width: ${remaining}%"></div>
        </div>
        <div class="subtasks">
          ${subsHtml}
        </div>
      `;
      list.appendChild(div);

    } else {
      // ── 単独タスク ──
      const div = document.createElement("div");
      div.className = "task-item" + (isDone ? " completed" : "");
      div.innerHTML = `
        <div class="task-header">
          <div>
            <span class="task-name">${isDone ? "✅ " : ""}${task.name}</span>
            <span class="tag ${task.tag}">${tagLabel}</span>
          </div>
          <div class="task-remaining ${cc}">
            ${isDone ? "完了" : remaining + "%"}
          </div>
        </div>
        <div class="bar-container">
          <div class="bar-fill ${cc}" style="width: ${remaining}%"></div>
        </div>
      `;
      list.appendChild(div);
    }
  });

  // サマリー（サブタスク単位でカウント）
  let allSubs = [];
  tasks.forEach(t => {
    if (t.subtasks && t.subtasks.length > 0) {
      allSubs.push(...t.subtasks);
    } else {
      allSubs.push({ remaining: t.remaining || 0 });
    }
  });
  const total = allSubs.length;
  const done = allSubs.filter(s => s.remaining <= 0).length;
  const remain = total - done;
  const active = allSubs.filter(s => s.remaining > 0);
  const avg = active.length > 0
    ? Math.round(active.reduce((s, t) => s + t.remaining, 0) / active.length)
    : 0;

  document.getElementById("totalCount").textContent = total;
  document.getElementById("doneCount").textContent = done;
  document.getElementById("remainCount").textContent = remain;
  document.getElementById("avgRemain").textContent = avg + "%";
  document.getElementById("lastUpdate").textContent = LAST_UPDATE;
}

render();
</script>
</body>
</html>
